name: Desktop Build & Release

on:
  push:
    branches: [master, main]
    paths:
      - 'companion/**'
      - 'install_*.sh'
      - 'install_*.bat'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller websockets zeroconf ifaddr

      - name: Build Linux executable
        working-directory: companion
        run: |
          pyinstaller --clean --noconfirm phonedeck-server-linux.spec

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: phonedeck-server-linux
          path: companion/dist/phonedeck-server-linux
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller websockets zeroconf ifaddr pywin32 wmi

      - name: Build Windows executable
        working-directory: companion
        run: |
          pyinstaller --clean --noconfirm phonedeck-server-windows.spec

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: phonedeck-server-windows.exe
          path: companion/dist/phonedeck-server-windows.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller websockets zeroconf ifaddr

      - name: Build macOS executable
        working-directory: companion
        run: |
          pyinstaller --clean --noconfirm --onefile server.py --name phonedeck-server-macos

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: phonedeck-server-macos
          path: companion/dist/phonedeck-server-macos
          retention-days: 30

  create-release:
    needs: [build-linux, build-windows, build-macos]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/phonedeck-server-linux/phonedeck-server-linux release-assets/phonedeck-server-linux 2>/dev/null || true
          cp artifacts/phonedeck-server-windows.exe/phonedeck-server-windows.exe release-assets/phonedeck-server-windows.exe 2>/dev/null || true
          cp artifacts/phonedeck-server-macos/phonedeck-server-macos release-assets/phonedeck-server-macos 2>/dev/null || true

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build Companion Apps

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller websockets zeroconf
        
    - name: Build executable
      run: |
        cd companion
        pyinstaller --onefile --name phonedeck-server server.py
        
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: phonedeck-server-${{ runner.os }}
        path: companion/dist/phonedeck-server*
        
    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: companion/dist/phonedeck-server*
